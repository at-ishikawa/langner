syntax = "proto3";

package api.v1;

import "buf/validate/validate.proto";

option go_package = "github.com/at-ishikawa/langner/gen-protos/api/v1;apiv1";

service NotebookService {
  rpc GetNotebookDetail(GetNotebookDetailRequest) returns (GetNotebookDetailResponse);
  rpc ExportNotebookPDF(ExportNotebookPDFRequest) returns (ExportNotebookPDFResponse);
  rpc LookupWord(LookupWordRequest) returns (LookupWordResponse);
  rpc RegisterDefinition(RegisterDefinitionRequest) returns (RegisterDefinitionResponse);
  rpc DeleteDefinition(DeleteDefinitionRequest) returns (DeleteDefinitionResponse);
  rpc GetEtymologyNotebook(GetEtymologyNotebookRequest) returns (GetEtymologyNotebookResponse);
}

message GetNotebookDetailRequest {
  string notebook_id = 1 [
    (buf.validate.field).string.min_len = 1
  ];
}

message GetNotebookDetailResponse {
  string notebook_id = 1;
  string name = 2;
  repeated StoryEntry stories = 3;
  int32 total_word_count = 4;
}

message StoryEntry {
  string event = 1;
  StoryMetadata metadata = 2;
  string date = 3;
  repeated StoryScene scenes = 4;
}

message StoryMetadata {
  string series = 1;
  int32 season = 2;
  int32 episode = 3;
}

message StoryScene {
  string title = 1;
  repeated Conversation conversations = 2;
  repeated NotebookWord definitions = 3;
  repeated string statements = 5;
}

message Conversation {
  string speaker = 1;
  string quote = 2;
}

message NotebookWord {
  string expression = 1;
  string definition = 2;
  string meaning = 3;
  string part_of_speech = 4;
  string pronunciation = 5;
  repeated string examples = 6;
  repeated string synonyms = 7;
  repeated string antonyms = 8;
  string learning_status = 9;
  repeated LearningLogEntry learned_logs = 10;
  reserved 11;
  string next_review_date = 12;
  string origin = 13;
  // is_skipped is true when the expression is excluded from at least one
  // quiz mode. Kept for the existing single-badge UI; per-type badges
  // should consume skipped_quiz_types directly.
  bool is_skipped = 14;
  // skipped_quiz_types lists the quiz type strings (e.g. "notebook",
  // "reverse", "etymology_breakdown") this expression is excluded from.
  // Empty when not skipped from anywhere.
  repeated string skipped_quiz_types = 15;
}

message LearningLogEntry {
  string status = 1;
  string learned_at = 2;
  int32 quality = 3;
  int64 response_time_ms = 4;
  string quiz_type = 5;
  int32 interval_days = 6;
}

message ExportNotebookPDFRequest {
  string notebook_id = 1 [
    (buf.validate.field).string.min_len = 1
  ];
}

message ExportNotebookPDFResponse {
  bytes pdf_content = 1;
  string filename = 2;
}

message LookupWordRequest {
  string word = 1 [(buf.validate.field).string.min_len = 1];
  string notebook_id = 2;
  string context = 3;
}

message WordDefinition {
  string part_of_speech = 1;
  string definition = 2;
  repeated string examples = 3;
  repeated string synonyms = 4;
  string pronunciation = 5;
  repeated string antonyms = 6;
  string origin = 7;
}

message LookupWordResponse {
  string word = 1;
  repeated WordDefinition definitions = 2;
  string source = 3;
}

message RegisterDefinitionRequest {
  string notebook_id = 1 [(buf.validate.field).string.min_len = 1];
  string notebook_file = 2;
  int32 scene_index = 3;
  string expression = 4 [(buf.validate.field).string.min_len = 1];
  string meaning = 5 [(buf.validate.field).string.min_len = 1];
  string part_of_speech = 6;
  repeated string examples = 7;
}

message RegisterDefinitionResponse {}

message DeleteDefinitionRequest {
  string notebook_id = 1 [(buf.validate.field).string.min_len = 1];
  string notebook_file = 2;
  int32 scene_index = 3;
  string expression = 4 [(buf.validate.field).string.min_len = 1];
}

message DeleteDefinitionResponse {}

// Etymology Notebook
message EtymologyOriginPart {
  string origin = 1;
  string type = 2;
  string language = 3;
  string meaning = 4;
  int32 word_count = 5;
}

message EtymologyDefinition {
  string expression = 1;
  string meaning = 2;
  string part_of_speech = 3;
  string note = 4;
  repeated EtymologyOriginPart origin_parts = 5;
  string notebook_name = 6;
  repeated string examples = 7;
  repeated string contexts = 8; // statements or conversations from the source scene
}

message EtymologyMeaningGroup {
  string meaning = 1;
  repeated EtymologyOriginPart origins = 2;
}

message GetEtymologyNotebookRequest {
  string notebook_id = 1 [
    (buf.validate.field).string.min_len = 1
  ];
}

message GetEtymologyNotebookResponse {
  repeated EtymologyOriginPart origins = 1;
  repeated EtymologyDefinition definitions = 2;
  repeated EtymologyMeaningGroup meaning_groups = 3;
  int32 origin_count = 4;
  int32 definition_count = 5;
}
