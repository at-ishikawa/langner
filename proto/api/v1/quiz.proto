syntax = "proto3";

package api.v1;

import "buf/validate/validate.proto";

option go_package = "github.com/at-ishikawa/langner/gen-protos/api/v1;apiv1";

enum QuizType {
  QUIZ_TYPE_UNSPECIFIED = 0;
  QUIZ_TYPE_STANDARD = 1;
  QUIZ_TYPE_REVERSE = 2;
  QUIZ_TYPE_FREEFORM = 3;
  QUIZ_TYPE_ETYMOLOGY_BREAKDOWN = 4;
  QUIZ_TYPE_ETYMOLOGY_ASSEMBLY = 5;
}

enum EtymologyQuizMode {
  ETYMOLOGY_QUIZ_MODE_UNSPECIFIED = 0;
  ETYMOLOGY_QUIZ_MODE_BREAKDOWN = 1;
  ETYMOLOGY_QUIZ_MODE_ASSEMBLY = 2;
}

service QuizService {
  rpc GetQuizOptions(GetQuizOptionsRequest) returns (GetQuizOptionsResponse);
  rpc StartQuiz(StartQuizRequest) returns (StartQuizResponse);
  rpc SubmitAnswer(SubmitAnswerRequest) returns (SubmitAnswerResponse);
  rpc StartReverseQuiz(StartReverseQuizRequest) returns (StartReverseQuizResponse);
  rpc SubmitReverseAnswer(SubmitReverseAnswerRequest) returns (SubmitReverseAnswerResponse);
  rpc StartFreeformQuiz(StartFreeformQuizRequest) returns (StartFreeformQuizResponse);
  rpc SubmitFreeformAnswer(SubmitFreeformAnswerRequest) returns (SubmitFreeformAnswerResponse);
  rpc OverrideAnswer(OverrideAnswerRequest) returns (OverrideAnswerResponse);
  rpc UndoOverrideAnswer(UndoOverrideAnswerRequest) returns (UndoOverrideAnswerResponse);
  rpc SkipWord(SkipWordRequest) returns (SkipWordResponse);
  rpc ResumeWord(ResumeWordRequest) returns (ResumeWordResponse);
  rpc StartEtymologyQuiz(StartEtymologyQuizRequest) returns (StartEtymologyQuizResponse);
  rpc SubmitEtymologyBreakdownAnswer(SubmitEtymologyBreakdownAnswerRequest) returns (SubmitEtymologyBreakdownAnswerResponse);
  rpc SubmitEtymologyAssemblyAnswer(SubmitEtymologyAssemblyAnswerRequest) returns (SubmitEtymologyAssemblyAnswerResponse);
  rpc StartEtymologyFreeformQuiz(StartEtymologyFreeformQuizRequest) returns (StartEtymologyFreeformQuizResponse);
  rpc SubmitEtymologyFreeformAnswer(SubmitEtymologyFreeformAnswerRequest) returns (SubmitEtymologyFreeformAnswerResponse);
}

message GetQuizOptionsRequest {}

message GetQuizOptionsResponse {
  repeated NotebookSummary notebooks = 1;
}

message NotebookSummary {
  string notebook_id = 1;
  string name = 2;
  int32 review_count = 3;
  string kind = 4;
  int32 reverse_review_count = 5;
  int32 etymology_review_count = 6;
}

message StartQuizRequest {
  repeated string notebook_ids = 1 [
    (buf.validate.field).repeated.min_items = 1
  ];
  bool include_unstudied = 2;
}

message StartQuizResponse {
  repeated Flashcard flashcards = 1;
}

message Flashcard {
  int64 note_id = 1;
  string entry = 2;
  repeated Example examples = 3;
}

message Example {
  string text = 1;
  string speaker = 2;
}

message WordDetail {
  string origin = 1;
  string pronunciation = 2;
  string part_of_speech = 3;
  repeated string synonyms = 4;
  repeated string antonyms = 5;
  string memo = 6;
}

message SubmitAnswerRequest {
  int64 note_id = 1 [
    (buf.validate.field).int64.gt = 0
  ];
  string answer = 2 [
    (buf.validate.field).string = {
      min_len: 1,
      pattern: "\\S"
    }
  ];
  int64 response_time_ms = 3;
}

message SubmitAnswerResponse {
  bool correct = 1;
  string meaning = 2;
  string reason = 3;
  WordDetail word_detail = 4;
  string next_review_date = 5;
  string learned_at = 6;
}

message StartReverseQuizRequest {
  repeated string notebook_ids = 1 [
    (buf.validate.field).repeated.min_items = 1
  ];
  bool list_missing_context = 2;
}

message StartReverseQuizResponse {
  repeated ReverseFlashcard flashcards = 1;
}

message ReverseFlashcard {
  int64 note_id = 1;
  string meaning = 2;
  repeated ContextSentence contexts = 3;
  string notebook_name = 4;
  string story_title = 5;
  string scene_title = 6;
}

message ContextSentence {
  string context = 1;
  string masked_context = 2;
}

message SubmitReverseAnswerRequest {
  int64 note_id = 1 [
    (buf.validate.field).int64.gt = 0
  ];
  string answer = 2 [
    (buf.validate.field).string = {
      min_len: 1,
      pattern: "\\S"
    }
  ];
  int64 response_time_ms = 3;
}

message SubmitReverseAnswerResponse {
  bool correct = 1;
  string expression = 2;
  string meaning = 3;
  string reason = 4;
  repeated string contexts = 5;
  WordDetail word_detail = 6;
  string classification = 7;
  string next_review_date = 8;
  string learned_at = 9;
}

message StartFreeformQuizRequest {}

message StartFreeformQuizResponse {
  int32 word_count = 1;
  repeated string expressions = 2;
  map<string, string> expression_next_review_date = 3;
}

message SubmitFreeformAnswerRequest {
  string word = 1 [
    (buf.validate.field).string = {
      min_len: 1,
      pattern: "\\S"
    }
  ];
  string meaning = 2 [
    (buf.validate.field).string = {
      min_len: 1,
      pattern: "\\S"
    }
  ];
  int64 response_time_ms = 3;
}

message SubmitFreeformAnswerResponse {
  bool correct = 1;
  string word = 2;
  string meaning = 3;
  string reason = 4;
  string context = 5;
  string notebook_name = 6;
  WordDetail word_detail = 7;
  string next_review_date = 8;
  string learned_at = 9;
}

// Override Answer
message OverrideAnswerRequest {
  int64 note_id = 1 [
    (buf.validate.field).int64.gt = 0
  ];
  QuizType quiz_type = 2;
  string learned_at = 3 [
    (buf.validate.field).string.min_len = 10
  ];
  optional bool mark_correct = 4;
  optional string next_review_date = 5;
}

message OverrideAnswerResponse {
  string next_review_date = 1;
  int32 original_quality = 2;
  string original_status = 3;
  int32 original_interval_days = 4;
  double original_easiness_factor = 5;
}

// Undo Override Answer
message UndoOverrideAnswerRequest {
  int64 note_id = 1 [
    (buf.validate.field).int64.gt = 0
  ];
  QuizType quiz_type = 2;
  string learned_at = 3 [
    (buf.validate.field).string.min_len = 10
  ];
  int32 original_quality = 4;
  string original_status = 5;
  int32 original_interval_days = 6;
  double original_easiness_factor = 7;
}

message UndoOverrideAnswerResponse {
  bool correct = 1;
  string next_review_date = 2;
}

// Skip Word
message SkipWordRequest {
  int64 note_id = 1 [
    (buf.validate.field).int64.gt = 0
  ];
  QuizType quiz_type = 2;
  string skip_until = 3;
}

message SkipWordResponse {}

// Resume Skipped Word
message ResumeWordRequest {
  int64 note_id = 1 [
    (buf.validate.field).int64.gt = 0
  ];
  QuizType quiz_type = 2;
}

message ResumeWordResponse {}

// Etymology Quiz Messages
message EtymologyOriginAnswer {
  string origin = 1;
  string meaning = 2;
}

message EtymologyOriginGrade {
  string user_origin = 1;
  string user_meaning = 2;
  bool origin_correct = 3;
  bool meaning_correct = 4;
  EtymologyOriginAnswer correct_origin = 5;
}

message EtymologyQuizCard {
  int64 card_id = 1;
  string expression = 2;
  string meaning = 3;
  repeated EtymologyQuizOriginPart origin_parts = 4;
  string notebook_name = 5;
}

message EtymologyQuizOriginPart {
  string origin = 1;
  string type = 2;
  string language = 3;
  string meaning = 4;
}

message RelatedDefinition {
  string expression = 1;
  string meaning = 2;
  string notebook_name = 3;
}

message StartEtymologyQuizRequest {
  repeated string etymology_notebook_ids = 1;
  repeated string definition_notebook_ids = 2;
  EtymologyQuizMode mode = 3;
  bool include_unstudied = 4;
}

message StartEtymologyQuizResponse {
  repeated EtymologyQuizCard cards = 1;
}

message SubmitEtymologyBreakdownAnswerRequest {
  int64 card_id = 1 [
    (buf.validate.field).int64.gt = 0
  ];
  repeated EtymologyOriginAnswer answers = 2;
  int64 response_time_ms = 3;
}

message SubmitEtymologyBreakdownAnswerResponse {
  bool correct = 1;
  string reason = 2;
  repeated EtymologyOriginGrade origin_grades = 3;
  repeated RelatedDefinition related_definitions = 4;
  string next_review_date = 5;
  string learned_at = 6;
  int64 note_id = 7;
}

message SubmitEtymologyAssemblyAnswerRequest {
  int64 card_id = 1 [
    (buf.validate.field).int64.gt = 0
  ];
  string answer = 2 [
    (buf.validate.field).string = {
      min_len: 1,
      pattern: "\\S"
    }
  ];
  int64 response_time_ms = 3;
}

message SubmitEtymologyAssemblyAnswerResponse {
  bool correct = 1;
  string reason = 2;
  string correct_expression = 3;
  repeated EtymologyQuizOriginPart origin_parts = 4;
  repeated RelatedDefinition related_definitions = 5;
  string next_review_date = 6;
  string learned_at = 7;
  int64 note_id = 8;
}

message StartEtymologyFreeformQuizRequest {
  repeated string etymology_notebook_ids = 1;
  repeated string definition_notebook_ids = 2;
}

message StartEtymologyFreeformQuizResponse {
  repeated string expressions = 1;
  map<string, string> next_review_dates = 2;
}

message SubmitEtymologyFreeformAnswerRequest {
  string expression = 1 [
    (buf.validate.field).string = {
      min_len: 1,
      pattern: "\\S"
    }
  ];
  repeated EtymologyOriginAnswer answers = 2;
  int64 response_time_ms = 3;
}

message SubmitEtymologyFreeformAnswerResponse {
  bool correct = 1;
  string reason = 2;
  repeated EtymologyOriginGrade origin_grades = 3;
  repeated RelatedDefinition related_definitions = 4;
  string next_review_date = 5;
  string learned_at = 6;
  string notebook_name = 7;
  int64 note_id = 8;
}
