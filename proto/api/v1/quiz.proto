syntax = "proto3";

package api.v1;

import "buf/validate/validate.proto";

option go_package = "github.com/at-ishikawa/langner/gen-protos/api/v1;apiv1";

enum QuizType {
  QUIZ_TYPE_UNSPECIFIED = 0;
  QUIZ_TYPE_STANDARD = 1;
  QUIZ_TYPE_REVERSE = 2;
  QUIZ_TYPE_FREEFORM = 3;
  QUIZ_TYPE_ETYMOLOGY_STANDARD = 4;
  QUIZ_TYPE_ETYMOLOGY_REVERSE = 5;
  QUIZ_TYPE_ETYMOLOGY_FREEFORM = 6;
  // QUIZ_TYPE_RELEARN is a label-only value used by the Relearn Quiz to tag
  // where a pooled word originally came from and to name the mode in the UI.
  // It is NEVER written to a learning_logs row or a YAML quiz_type field —
  // the Relearn Quiz records no learning history at all.
  QUIZ_TYPE_RELEARN = 7;
}

enum EtymologyQuizMode {
  ETYMOLOGY_QUIZ_MODE_UNSPECIFIED = 0;
  ETYMOLOGY_QUIZ_MODE_STANDARD = 1;
  ETYMOLOGY_QUIZ_MODE_REVERSE = 2;
}

service QuizService {
  rpc GetQuizOptions(GetQuizOptionsRequest) returns (GetQuizOptionsResponse);
  rpc StartQuiz(StartQuizRequest) returns (StartQuizResponse);
  rpc SubmitAnswer(SubmitAnswerRequest) returns (SubmitAnswerResponse);
  rpc BatchSubmitAnswers(BatchSubmitAnswersRequest) returns (BatchSubmitAnswersResponse);
  rpc StartReverseQuiz(StartReverseQuizRequest) returns (StartReverseQuizResponse);
  rpc SubmitReverseAnswer(SubmitReverseAnswerRequest) returns (SubmitReverseAnswerResponse);
  rpc BatchSubmitReverseAnswers(BatchSubmitReverseAnswersRequest) returns (BatchSubmitReverseAnswersResponse);
  rpc StartFreeformQuiz(StartFreeformQuizRequest) returns (StartFreeformQuizResponse);
  rpc SubmitFreeformAnswer(SubmitFreeformAnswerRequest) returns (SubmitFreeformAnswerResponse);
  rpc OverrideAnswer(OverrideAnswerRequest) returns (OverrideAnswerResponse);
  rpc UndoOverrideAnswer(UndoOverrideAnswerRequest) returns (UndoOverrideAnswerResponse);
  rpc SkipWord(SkipWordRequest) returns (SkipWordResponse);
  rpc ResumeWord(ResumeWordRequest) returns (ResumeWordResponse);
  rpc StartEtymologyQuiz(StartEtymologyQuizRequest) returns (StartEtymologyQuizResponse);
  rpc SubmitEtymologyStandardAnswer(SubmitEtymologyStandardAnswerRequest) returns (SubmitEtymologyStandardAnswerResponse);
  rpc BatchSubmitEtymologyStandardAnswers(BatchSubmitEtymologyStandardAnswersRequest) returns (BatchSubmitEtymologyStandardAnswersResponse);
  rpc SubmitEtymologyReverseAnswer(SubmitEtymologyReverseAnswerRequest) returns (SubmitEtymologyReverseAnswerResponse);
  rpc BatchSubmitEtymologyReverseAnswers(BatchSubmitEtymologyReverseAnswersRequest) returns (BatchSubmitEtymologyReverseAnswersResponse);
  rpc StartEtymologyFreeformQuiz(StartEtymologyFreeformQuizRequest) returns (StartEtymologyFreeformQuizResponse);
  rpc SubmitEtymologyFreeformAnswer(SubmitEtymologyFreeformAnswerRequest) returns (SubmitEtymologyFreeformAnswerResponse);

  // Relearn Quiz — a practice-only quiz over recently-missed words. It writes
  // NOTHING to learning history: Submit calls only the pure meaning graders,
  // never any Save/UpdateLog path, and the responses carry no next_review_date
  // or learned_at. See docs/content/proposals/relearn-quiz.
  rpc StartRelearnQuiz(StartRelearnQuizRequest) returns (StartRelearnQuizResponse);
  rpc SubmitRelearnAnswer(SubmitRelearnAnswerRequest) returns (SubmitRelearnAnswerResponse);
  rpc BatchSubmitRelearnAnswers(BatchSubmitRelearnAnswersRequest) returns (BatchSubmitRelearnAnswersResponse);
}

message GetQuizOptionsRequest {
  // include_unstudied, when true, makes review counts on every
  // notebook and section reflect the "Include unstudied words" toggle
  // on the quiz start page: never-seen words and words still within
  // their SR interval are added to the due count, matching what the
  // actual quiz will load. Defaults to false (due-only counts).
  bool include_unstudied = 1;
}

message GetQuizOptionsResponse {
  repeated NotebookSummary notebooks = 1;
}

message NotebookSummary {
  string notebook_id = 1;
  string name = 2;
  int32 review_count = 3;
  string kind = 4;
  int32 reverse_review_count = 5;
  int32 etymology_review_count = 6;
  // has_content is true when any scene in the notebook has statements or
  // conversations — i.e., there is prose/dialogue to read, not just flashcards.
  bool has_content = 7;
  // sections lists the sections within this notebook in document order.
  // Sections are story events (chapters/episodes) for vocabulary notebooks
  // and session titles for etymology notebooks. Empty for flashcard or
  // definitions-only notebooks that have no section hierarchy.
  repeated NotebookSectionSummary sections = 8;
  // etymology_reverse_review_count is the per-notebook due count for the
  // etymology reverse quiz. etymology_review_count is the standard count.
  // The two can differ because the same origin can be due in one mode and
  // not in the other (each mode tracks its own SR interval and skip flag).
  int32 etymology_reverse_review_count = 9;
}

// NotebookSectionSummary holds the display title and per-mode review counts
// for a single section within a notebook.
message NotebookSectionSummary {
  string title = 1;
  int32 review_count = 2;
  int32 reverse_review_count = 3;
  int32 etymology_review_count = 4;
  int32 etymology_reverse_review_count = 5;
}

// NotebookSection narrows a quiz request to specific sections within a single
// notebook. When section_titles is empty, every section of the notebook is
// included (equivalent to passing the notebook_id alone).
message NotebookSection {
  string notebook_id = 1 [
    (buf.validate.field).string.min_len = 1
  ];
  repeated string section_titles = 2;
}

message StartQuizRequest {
  repeated string notebook_ids = 1;
  bool include_unstudied = 2;
  // notebook_sections, when non-empty, replaces notebook_ids and allows the
  // caller to narrow the quiz to specific sections within each notebook.
  repeated NotebookSection notebook_sections = 3;
}

message StartQuizResponse {
  repeated Flashcard flashcards = 1;
}

message Flashcard {
  int64 note_id = 1;
  string entry = 2;
  repeated Example examples = 3;
  // original_entry is the expression as it appears in the conversation text
  // (e.g., "racked up"), while entry is the canonical/dictionary form
  // (e.g., "rack up"). Used for highlighting the expression in context.
  string original_entry = 4;

  // concept_head names the head expression of the definitions concept this
  // flashcard belongs to (empty when not a concept). When set, the UI may
  // render a "Family" chip listing concept_members and surface
  // concept_meaning as the umbrella prompt.
  string concept_head = 5;
  repeated string concept_members = 6;
  string concept_meaning = 7;
}

message Example {
  string text = 1;
  string speaker = 2;
}

message WordDetail {
  string origin = 1;
  string pronunciation = 2;
  string part_of_speech = 3;
  repeated string synonyms = 4;
  repeated string antonyms = 5;
  string memo = 6;
  repeated WordOriginPart origin_parts = 7;
}

message WordOriginPart {
  string origin = 1;
  string type = 2;
  string language = 3;
  string meaning = 4;
}

message SubmitAnswerRequest {
  int64 note_id = 1 [
    (buf.validate.field).int64.gt = 0
  ];
  // answer is the user's typed meaning. When is_skipped is true the field is
  // ignored and the backend records the result as incorrect without grading.
  string answer = 2;
  int64 response_time_ms = 3;
  bool is_skipped = 4;
}

message SubmitAnswerResponse {
  bool correct = 1;
  string meaning = 2;
  string reason = 3;
  WordDetail word_detail = 4;
  string next_review_date = 5;
  string learned_at = 6;
  repeated string images = 7;
  // part_of_speech is the sense discriminator of the just-written learning
  // log. The frontend echoes it back on OverrideAnswer/UndoOverrideAnswer so
  // the override targets the correct sense of a homograph (e.g. "record" the
  // noun vs the verb). Empty for single-sense / legacy words.
  string part_of_speech = 8;
}

message BatchSubmitAnswersRequest {
  repeated SubmitAnswerRequest answers = 1 [
    (buf.validate.field).repeated.min_items = 1
  ];
}

message BatchSubmitAnswersResponse {
  repeated SubmitAnswerResponse responses = 1;
}

message StartReverseQuizRequest {
  repeated string notebook_ids = 1;
  bool list_missing_context = 2;
  // notebook_sections, when non-empty, replaces notebook_ids and allows the
  // caller to narrow the quiz to specific sections within each notebook.
  repeated NotebookSection notebook_sections = 3;
  // include_unstudied mirrors the standard quiz toggle: when true, words
  // that haven't cleared the freeform/correct prerequisite (including
  // never-seen words) are included; studied words still respect their
  // reverse SR interval. Ignored when list_missing_context is set (that
  // mode lists by context presence, not review state).
  bool include_unstudied = 4;
}

message StartReverseQuizResponse {
  repeated ReverseFlashcard flashcards = 1;
}

message ReverseFlashcard {
  int64 note_id = 1;
  string meaning = 2;
  repeated ContextSentence contexts = 3;
  string notebook_name = 4;
  string story_title = 5;
  string scene_title = 6;

  // concept_head/members/meaning carry the same concept context as on
  // Flashcard; reverse quizzes accept any concept_member as a correct
  // answer when concept_head is set.
  string concept_head = 7;
  repeated string concept_members = 8;
  string concept_meaning = 9;
}

message ContextSentence {
  string context = 1;
  string masked_context = 2;
}

message SubmitReverseAnswerRequest {
  int64 note_id = 1 [
    (buf.validate.field).int64.gt = 0
  ];
  // answer is the user's guess at the word. When is_skipped is true the field
  // is ignored and the backend records the result as incorrect without grading.
  string answer = 2;
  int64 response_time_ms = 3;
  // When true, a "synonym" classification is persisted as a correct learning
  // log entry (with reduced quality). The frontend sets this on retry batches
  // where the user has already had a chance to provide the exact word.
  bool accept_synonym_as_correct = 4;
  bool is_skipped = 5;
}

message SubmitReverseAnswerResponse {
  bool correct = 1;
  string expression = 2;
  string meaning = 3;
  string reason = 4;
  repeated string contexts = 5;
  WordDetail word_detail = 6;
  string classification = 7;
  string next_review_date = 8;
  string learned_at = 9;
  repeated string images = 10;
  // part_of_speech: see SubmitAnswerResponse.part_of_speech.
  string part_of_speech = 11;
}

message BatchSubmitReverseAnswersRequest {
  repeated SubmitReverseAnswerRequest answers = 1 [
    (buf.validate.field).repeated.min_items = 1
  ];
}

message BatchSubmitReverseAnswersResponse {
  repeated SubmitReverseAnswerResponse responses = 1;
}

message StartFreeformQuizRequest {}

message StartFreeformQuizResponse {
  int32 word_count = 1;
  repeated string expressions = 2;
  map<string, string> expression_next_review_date = 3;
}

message SubmitFreeformAnswerRequest {
  string word = 1 [
    (buf.validate.field).string = {
      min_len: 1,
      pattern: "\\S"
    }
  ];
  string meaning = 2 [
    (buf.validate.field).string = {
      min_len: 1,
      pattern: "\\S"
    }
  ];
  int64 response_time_ms = 3;
}

message SubmitFreeformAnswerResponse {
  bool correct = 1;
  string word = 2;
  string meaning = 3;
  string reason = 4;
  string context = 5;
  string notebook_name = 6;
  WordDetail word_detail = 7;
  string next_review_date = 8;
  string learned_at = 9;
  int64 note_id = 10;
  repeated string images = 11;
  // part_of_speech: see SubmitAnswerResponse.part_of_speech.
  string part_of_speech = 12;
}

// Override Answer
message OverrideAnswerRequest {
  int64 note_id = 1 [
    (buf.validate.field).int64.gt = 0
  ];
  QuizType quiz_type = 2;
  string learned_at = 3 [
    (buf.validate.field).string.min_len = 10
  ];
  optional bool mark_correct = 4;
  optional string next_review_date = 5;
  // part_of_speech identifies which sense of a homograph the override
  // targets. Echoed from the Submit*Response the frontend rendered. Empty
  // matches the legacy/unspecified sense so pre-change data still overrides.
  string part_of_speech = 6;
}

message OverrideAnswerResponse {
  string next_review_date = 1;
  int32 original_quality = 2;
  string original_status = 3;
  int32 original_interval_days = 4;
  reserved 5;
}

// Undo Override Answer
message UndoOverrideAnswerRequest {
  int64 note_id = 1 [
    (buf.validate.field).int64.gt = 0
  ];
  QuizType quiz_type = 2;
  string learned_at = 3 [
    (buf.validate.field).string.min_len = 10
  ];
  int32 original_quality = 4;
  string original_status = 5;
  int32 original_interval_days = 6;
  reserved 7;
  // part_of_speech: see OverrideAnswerRequest.part_of_speech.
  string part_of_speech = 8;
}

message UndoOverrideAnswerResponse {
  bool correct = 1;
  string next_review_date = 2;
}

// Skip Word
message SkipWordRequest {
  int64 note_id = 1 [
    (buf.validate.field).int64.gt = 0
  ];
  // quiz_types lists every quiz mode the word should be excluded from. The
  // server applies the whole set in one read-modify-write so multi-type
  // skips ("All" toggle) cannot race with each other.
  repeated QuizType quiz_types = 4 [
    (buf.validate.field).repeated.min_items = 1
  ];
  string skip_until = 3;
  reserved 2;
  reserved "quiz_type";
}

message SkipWordResponse {}

// Resume Skipped Word
message ResumeWordRequest {
  int64 note_id = 1 [
    (buf.validate.field).int64.gt = 0
  ];
  // quiz_types lists every quiz mode whose skip should be cleared. Same
  // rationale as SkipWordRequest.quiz_types.
  repeated QuizType quiz_types = 3 [
    (buf.validate.field).repeated.min_items = 1
  ];
  reserved 2;
  reserved "quiz_type";
}

message ResumeWordResponse {}

// Etymology Quiz Messages
message EtymologyQuizCard {
  int64 card_id = 1;
  string origin = 2;
  string type = 3;
  string language = 4;
  string meaning = 5;
  string notebook_name = 6;
  // session_title is the metadata.title of the etymology session that defined
  // this origin sense. The same origin string in different sessions becomes
  // separate cards (e.g. "ana" = "up" in Session 13, "ana" = "negative" in
  // Session 16) so this field disambiguates them.
  string session_title = 7;
  // example_words are expressions from the consolidated definitions notebook
  // that reference this exact (origin, session_title, sense) tuple. Standard
  // quiz shows these alongside the origin so the user can recognise which
  // sense is being asked about.
  repeated string example_words = 8;
  // graph_prompt, when non-nil, replaces the plain prompt for reverse-mode
  // quiz cards: the frontend renders the small subgraph and the user types
  // into the single blank node. Standard mode ignores this field.
  GraphPrompt graph_prompt = 9;
  // sense disambiguates same-session multi-sense origins. For pathos in
  // Session 9 of a Greek roots notebook the user has two distinct cards
  // with sense="feeling" and sense="disease" respectively; the frontend
  // surfaces this on the prompt so the learner knows which sense is
  // being asked about. Empty for single-sense origins.
  string sense = 10;
}

// GraphPrompt is a small subgraph rendered as the prompt for a reverse
// quiz card, with one node replaced by a blank the user fills in. The
// answer matches the EtymologyQuizCard's `origin` (the citation form for
// the card's sense).
message GraphPrompt {
  enum Shape {
    SHAPE_UNSPECIFIED = 0;
    CLUSTER = 1;       // concept with N members, one slot blank
    ANTONYM_PAIR = 2;  // two antonym-linked concepts, one slot blank on one side
    FORM_BRANCH = 3;   // origin with forms, one form/English-word slot blank
  }
  Shape shape = 1;
  repeated GraphNode nodes = 2;
  repeated GraphEdge edges = 3;
  // blank_node_id is the id of the GraphNode whose answer the user types.
  // Always populated; v1 supports exactly one blank.
  string blank_node_id = 4;
}

message GraphNode {
  string id = 1;
  enum Kind {
    KIND_UNSPECIFIED = 0;
    CONCEPT = 1;       // a semantic concept's meaning label
    ORIGIN = 2;        // a source-language origin
    FORM = 3;          // an inflectional form of an origin
    ENGLISH_WORD = 4;  // an English derivative
  }
  Kind kind = 2;
  // label is the visible text. Empty when this node is the blank.
  string label = 3;
  // language and hint augment the label for cues the learner needs to
  // narrow the blank: language is shown next to ORIGIN nodes (e.g.
  // "French"); hint is free text shown on the blank node (e.g. the
  // meaning of the missing English word so the user can guess uniquely).
  string language = 4;
  string hint = 5;
  // meaning is the origin's English gloss as recorded in the etymology
  // YAML (e.g. "written (past participle of scribo)"). Rendered under
  // each ORIGIN node in CLUSTER / ANTONYM_PAIR shapes so the learner
  // can see how members of the same concept relate to each other —
  // not just one specific derivation rule but whatever the YAML
  // prose says ("form of con- before b, m, p", "adverb form of bonus",
  // "uncle on the mother's side", etc.). Empty on blank nodes (no leak
  // of the answer) and on CONCEPT / FORM / ENGLISH_WORD nodes.
  string meaning = 6;
}

message GraphEdge {
  string from = 1;
  string to = 2;
  // type is a free string ("member_of", "antonym", "has_form",
  // "derives", ...) so the renderer can colour and label the edge.
  string type = 3;
}

message StartEtymologyQuizRequest {
  repeated string etymology_notebook_ids = 1;
  EtymologyQuizMode mode = 3;
  bool include_unstudied = 4;
  // notebook_sections, when non-empty, replaces etymology_notebook_ids and
  // narrows the quiz to specific sessions within each etymology notebook.
  repeated NotebookSection notebook_sections = 5;
}

message StartEtymologyQuizResponse {
  repeated EtymologyQuizCard cards = 1;
}

message SubmitEtymologyStandardAnswerRequest {
  int64 card_id = 1 [(buf.validate.field).int64.gt = 0];
  // answer: user's guess. Ignored when is_skipped=true.
  string answer = 2;
  int64 response_time_ms = 3;
  bool is_skipped = 4;
}

message SubmitEtymologyStandardAnswerResponse {
  bool correct = 1;
  string reason = 2;
  string correct_meaning = 3;
  string next_review_date = 4;
  string learned_at = 5;
  int64 note_id = 6;
  // graph_context, when set, is the same kind of GraphPrompt the reverse
  // quiz uses as a prompt — but with no blank, served after a standard
  // answer as elaborative scaffolding. It lets the learner see the
  // origin in its concept / antonym / form-branch context at the
  // moment of greatest engagement (right after they tried to retrieve
  // its meaning). Frontend highlights the card's origin in the graph.
  GraphPrompt graph_context = 7;
  // example_words lists up to a handful of English vocabulary entries
  // that derive from this origin (collected from the definitions whose
  // origin_parts reference this origin). Helps the learner anchor an
  // abstract origin to concrete vocabulary they already know. Capped at
  // 5 server-side so the feedback card stays compact.
  repeated string example_words = 8;
}

message BatchSubmitEtymologyStandardAnswersRequest {
  repeated SubmitEtymologyStandardAnswerRequest answers = 1 [
    (buf.validate.field).repeated.min_items = 1
  ];
}

message BatchSubmitEtymologyStandardAnswersResponse {
  repeated SubmitEtymologyStandardAnswerResponse responses = 1;
}

message SubmitEtymologyReverseAnswerRequest {
  int64 card_id = 1 [(buf.validate.field).int64.gt = 0];
  // answer: user's guess. Ignored when is_skipped=true.
  string answer = 2;
  int64 response_time_ms = 3;
  bool is_skipped = 4;
}

message SubmitEtymologyReverseAnswerResponse {
  bool correct = 1;
  string reason = 2;
  string correct_origin = 3;
  string type = 4;
  string language = 5;
  string next_review_date = 6;
  string learned_at = 7;
  int64 note_id = 8;
  // example_words: see SubmitEtymologyStandardAnswerResponse.example_words.
  repeated string example_words = 9;
}

message BatchSubmitEtymologyReverseAnswersRequest {
  repeated SubmitEtymologyReverseAnswerRequest answers = 1 [
    (buf.validate.field).repeated.min_items = 1
  ];
}

message BatchSubmitEtymologyReverseAnswersResponse {
  repeated SubmitEtymologyReverseAnswerResponse responses = 1;
}

message StartEtymologyFreeformQuizRequest {
  repeated string etymology_notebook_ids = 1;
}

message StartEtymologyFreeformQuizResponse {
  repeated string origins = 1;
  map<string, string> next_review_dates = 2;
}

message SubmitEtymologyFreeformAnswerRequest {
  string origin = 1 [(buf.validate.field).string = {min_len: 1, pattern: "\\S"}];
  string meaning = 2 [(buf.validate.field).string = {min_len: 1, pattern: "\\S"}];
  int64 response_time_ms = 3;
}

message EtymologyOriginSense {
  string meaning = 1;
  string type = 2;
  string language = 3;
  string session_title = 4;
}

message SubmitEtymologyFreeformAnswerResponse {
  bool correct = 1;
  string reason = 2;
  string correct_meaning = 3;
  string type = 4;
  string language = 5;
  string notebook_name = 6;
  string next_review_date = 7;
  string learned_at = 8;
  int64 note_id = 9;
  // all_senses lists every recorded sense of the typed origin. The freeform
  // grader accepts any sense's meaning as correct; this field surfaces the
  // alternatives so the user is reminded that multi-sense origins exist.
  repeated EtymologyOriginSense all_senses = 10;
  // example_words: see SubmitEtymologyStandardAnswerResponse.example_words.
  repeated string example_words = 11;
}

// Relearn Quiz Messages
//
// The Relearn Quiz gathers every word answered incorrectly across all quiz
// types within a recent window and drills them in a unified recognition
// format. It is practice-only: nothing here is ever persisted to learning
// history, and the Submit response deliberately omits next_review_date and
// learned_at (there is no schedule to move and no log to override).

message StartRelearnQuizRequest {
  // window_hours is the look-back window for the wrong-word pool. 0 means
  // "use the default" (24). The server clamps the effective value to
  // [1, 168] (up to 7 days). A word qualifies when its most-recent learning
  // log inside the window has status "misunderstood".
  int32 window_hours = 1 [
    (buf.validate.field).int32 = {gte: 0, lte: 168}
  ];
}

message StartRelearnQuizResponse {
  repeated RelearnCard cards = 1;
}

message RelearnCard {
  int64 note_id = 1;
  // entry is the word (or etymology origin) — the prompt for recognition /
  // etymology-standard cards, and the answer the learner types for reverse /
  // etymology-reverse cards.
  string entry = 2;
  // source_quiz_type is the format the card is presented and graded in — the
  // quiz type it was failed in: QUIZ_TYPE_STANDARD (recognition: show entry,
  // ask meaning), QUIZ_TYPE_REVERSE (show meaning + contexts, ask entry),
  // QUIZ_TYPE_ETYMOLOGY_STANDARD (show origin, ask meaning), or
  // QUIZ_TYPE_ETYMOLOGY_REVERSE (show meaning, ask origin). Never persisted.
  QuizType source_quiz_type = 3;
  // meaning is the prompt for reverse / etymology-reverse cards and the
  // expected answer otherwise. Always sent so feedback can show both sides.
  string meaning = 4;
  repeated Example examples = 5;          // recognition hint
  repeated ContextSentence contexts = 6;  // reverse hint (masked)
  string type = 7;                        // etymology origin type (root/prefix/suffix)
  string language = 8;                    // etymology origin language
}

message SubmitRelearnAnswerRequest {
  int64 note_id = 1 [
    (buf.validate.field).int64.gt = 0
  ];
  // answer is the user's typed meaning. Ignored when is_skipped is true.
  string answer = 2;
  int64 response_time_ms = 3;
  bool is_skipped = 4;
}

message SubmitRelearnAnswerResponse {
  bool correct = 1;
  string meaning = 2;
  string reason = 3;
  WordDetail word_detail = 4;
  repeated string images = 5;

  // Rich Learn-page context, assembled read-only from notebook/etymology data:
  // the scenes the word appears in, the etymology relation graph, and related
  // words. All optional — omitted sub-parts render nothing.
  repeated RelearnContextScene context_scenes = 6;
  GraphPrompt graph_context = 7;
  repeated string example_words = 8;

  // NOTE: intentionally NO next_review_date and NO learned_at. The Relearn
  // Quiz writes no learning history, so there is no schedule to show and no
  // log to override.
}

// RelearnContextScene mirrors what the Learn page renders for a word: the
// prose statements and the speaker/quote conversation lines in which the
// expression appears, within one scene.
message RelearnContextScene {
  string notebook_name = 1;
  string scene_title = 2;
  repeated string statements = 3;
  repeated RelearnConversationLine conversations = 4;
}

message RelearnConversationLine {
  string speaker = 1;
  string quote = 2;
}

message BatchSubmitRelearnAnswersRequest {
  repeated SubmitRelearnAnswerRequest answers = 1 [
    (buf.validate.field).repeated.min_items = 1
  ];
}

message BatchSubmitRelearnAnswersResponse {
  repeated SubmitRelearnAnswerResponse responses = 1;
}

