syntax = "proto3";

package testing.v1;

option go_package = "github.com/at-ishikawa/langner/testrunner/gen-protos/testing/v1;testingv1";

// Common pieces shared across every per-RPC TestCase. Each per-RPC TestCase
// (generated by gen-test-suites) embeds these so the runner can interpret
// them generically via proto reflection.

message SetupStep {
  oneof step {
    WriteFile write_file = 1;   // seed a file inside the per-case sandbox
    ClearDir clear_dir = 2;     // wipe and recreate a directory in the sandbox
  }
}

message WriteFile {
  string path = 1;              // sandbox-relative; absolute path is passed through
  bytes content = 2;
}

message ClearDir {
  string path = 1;              // sandbox-relative; "" means the sandbox root
}

message ExpectedError {
  string message_regex = 1;     // regex applied to err.Error()
}

message StateAssertion {
  oneof assertion {
    FileExists file_exists = 1;
    FileAbsent file_absent = 2;
    FileContains file_contains = 3;
  }
}

message FileExists { string path = 1; }
message FileAbsent { string path = 1; }
message FileContains {
  string path = 1;
  repeated string contains = 2; // every entry must appear in the file
}
