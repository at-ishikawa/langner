# Two-mode title trade-off: the FilterFlashcardNotebooks read path uses
# notebook.Title (from cards.yml = "Common Idioms"), but SaveReverseResult
# / SaveResult hardcode StoryTitle="flashcards" when writing. Reads need
# the title to match "Common Idioms" or learningStatus is lost; writes
# can't update this entry because the title doesn't match "flashcards"
# (UpdateOrCreate falls through and writes a new sibling entry instead).
#
# Working around both: keep the title as "Common Idioms" so the filter
# test still resolves learningStatus, and seed reverse_logs so the
# BatchFeedback path's GetLatestLearnedInfo finds a non-empty learnedAt
# even when the live writes land on the sibling entry.
- metadata:
    id: idioms
    title: "Common Idioms"
    type: flashcard
  expressions:
    - expression: break the ice
      learned_logs:
        - status: understood
          learned_at: "2025-01-01T00:00:00Z"
          quality: 4
          quiz_type: freeform
          interval_days: 1
        - status: misunderstood
          learned_at: "2025-01-02T00:00:00Z"
          quality: 1
          quiz_type: notebook
          interval_days: 1
      reverse_logs:
        - status: misunderstood
          learned_at: "2025-01-02T00:00:00Z"
          quality: 1
          quiz_type: reverse
          interval_days: 1
    - expression: lose one's temper
      learned_logs:
        - status: understood
          learned_at: "2025-01-01T00:00:00Z"
          quality: 4
          quiz_type: freeform
          interval_days: 1
        - status: misunderstood
          learned_at: "2025-01-02T00:00:00Z"
          quality: 1
          quiz_type: notebook
          interval_days: 1
      reverse_logs:
        - status: misunderstood
          learned_at: "2025-01-02T00:00:00Z"
          quality: 1
          quiz_type: reverse
          interval_days: 1
