# title must be "flashcards" — backend SaveResult/SaveReverseResult hardcode
# StoryTitle to "flashcards" for flashcard notebooks. If this doesn't match,
# UpdateOrCreate spawns a separate history entry instead of writing to this
# one, and FindExpressionByName then returns the stale entry without any
# reverse_logs (so the BatchFeedback Mark/Override buttons stay hidden).
- metadata:
    id: idioms
    title: flashcards
    type: flashcard
  expressions:
    - expression: break the ice
      learned_logs:
        - status: understood
          learned_at: "2025-01-01T00:00:00Z"
          quality: 4
          quiz_type: freeform
          interval_days: 1
        - status: misunderstood
          learned_at: "2025-01-02T00:00:00Z"
          quality: 1
          quiz_type: notebook
          interval_days: 1
    - expression: lose one's temper
      learned_logs:
        - status: understood
          learned_at: "2025-01-01T00:00:00Z"
          quality: 4
          quiz_type: freeform
          interval_days: 1
        - status: misunderstood
          learned_at: "2025-01-02T00:00:00Z"
          quality: 1
          quiz_type: notebook
          interval_days: 1
