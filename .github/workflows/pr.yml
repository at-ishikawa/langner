name: Verify a Pull Request

on:
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'backend/go.mod'

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.6.1
          working-directory: backend

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'backend/go.mod'
      - name: Run tests with coverage check
        run: make test-coverage

  validate-examples:
    name: Validate example configurations
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        ports:
          - 3306:3306
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: local
          MYSQL_USER: user
          MYSQL_PASSWORD: password
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'backend/go.mod'

      - name: Build langner
        run: cd backend && go build -o ../langner ./cmd/langner

      - name: Run langner validate
        run: ./langner validate --config config.example.yml

      - name: Output markdown and PDF files
        run: ./langner --config config.example.yml notebooks stories friends --pdf

      - name: Install migrate tool
        run: go install -tags 'mysql' github.com/golang-migrate/migrate/v4/cmd/migrate@latest

      - name: Run database migrations
        run: migrate -source file://backend/schemas/migrations -database "mysql://user:password@tcp(localhost:3306)/local" up

      - name: Import example data to DB
        run: ./langner migrate import-db --config config.example.yml
        env:
          DB_PASSWORD: password

      - name: Run langner validate (with DB consistency)
        run: ./langner validate --config config.example.yml
        env:
          DB_PASSWORD: password

      - name: Run langner migrate validate-db
        run: ./langner migrate validate-db --config config.example.yml
        env:
          DB_PASSWORD: password
