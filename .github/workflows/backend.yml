name: Backend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

jobs:
  lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'backend/go.mod'

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.6.1
          working-directory: backend

  test:
    name: Backend Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'backend/go.mod'
      - name: Run tests with coverage check
        run: make test-coverage

  validate-examples:
    name: Validate example configurations
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        ports:
          - 3306:3306
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: local
          MYSQL_USER: user
          MYSQL_PASSWORD: password
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'backend/go.mod'

      - name: Build langner
        run: cd backend && go build -o ../langner ./cmd/langner

      - name: Run langner validate
        run: ./langner validate --config config.example.yml

      - name: Output markdown and PDF files
        run: ./langner --config config.example.yml notebooks stories friends --pdf

      - name: Install migrate tool
        run: go install -tags 'mysql' github.com/golang-migrate/migrate/v4/cmd/migrate@latest

      - name: Run database migrations
        run: migrate -source file://backend/schemas/migrations -database "mysql://user:password@tcp(localhost:3306)/local" up

      - name: Import example data to DB
        run: ./langner migrate import-db --config config.example.yml
        env:
          DB_PASSWORD: password

      - name: Run langner validate (with DB consistency)
        run: ./langner validate --config config.example.yml
        env:
          DB_PASSWORD: password

      - name: Run langner migrate validate-db
        run: ./langner migrate validate-db --config config.example.yml
        env:
          DB_PASSWORD: password

      # Exercise sync-db against MySQL end-to-end: drop the schema this
      # job just populated, run every migration from scratch, re-import
      # the example YAML, and verify the roundtrip. This is the path a
      # user would take to recover from a half-applied migration or
      # drifted DB; if it ever fails on a fresh checkout we want CI to
      # catch it instead of the user.
      - name: Run langner migrate sync-db (MySQL)
        run: ./langner migrate sync-db --config config.example.yml
        env:
          DB_PASSWORD: password

  sync-db-tidb:
    name: migrate sync-db against TiDB
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'backend/go.mod'

      # The PingCAP service image needs ContainerCommand overrides to
      # run in standalone mode, which GitHub Actions' `services:` block
      # doesn't support cleanly. Running it as a manual `docker run`
      # keeps the command line explicit.
      - name: Start TiDB
        run: |
          docker run -d --name tidb -p 4000:4000 \
            pingcap/tidb:v8.5.0 \
            /tidb-server -P 4000 --store=unistore --path=""
          for i in {1..60}; do
            if docker exec tidb /bin/sh -c "echo 'SELECT 1' | mysql -h 127.0.0.1 -P 4000 -u root" >/dev/null 2>&1; then
              echo "TiDB is ready"; break
            fi
            sleep 2
          done

      - name: Install mysql client
        run: sudo apt-get update && sudo apt-get install -y mysql-client

      - name: Create test database on TiDB
        run: mysql -h 127.0.0.1 -P 4000 -u root -e "CREATE DATABASE IF NOT EXISTS langner_tidb"

      - name: Write TiDB config
        run: |
          # Reuse config.example.yml but point at TiDB; root has no
          # password in unistore mode, so DB_PASSWORD is empty.
          sed -e 's/^  port:.*/  port: 4000/' \
              -e 's/^  database:.*/  database: langner_tidb/' \
              -e 's/^  username:.*/  username: root/' \
              -e 's/^  password:.*/  password: ""/' \
              config.example.yml > config.tidb.yml
          cat config.tidb.yml | head -25

      - name: Build langner
        run: cd backend && go build -o ../langner ./cmd/langner

      - name: Run langner migrate sync-db (TiDB)
        run: ./langner migrate sync-db --config config.tidb.yml
        env:
          DB_PASSWORD: ""

      - name: Verify quiz-review wires up against TiDB
        run: ./langner --config config.tidb.yml notebooks quiz-review 2025-01-01
        env:
          DB_PASSWORD: ""

      - name: Dump TiDB logs on failure
        if: failure()
        run: docker logs tidb | tail -200
