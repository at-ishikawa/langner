<!doctype html>
<html>
<head><title>Newer YouTube Layout - YouTube</title></head>
<body>
<!-- Fixture for the newer transcript-segment-view-model layout seen
     after YouTube's March 2026 UI update. -->

<ytd-watch-metadata>
  <div id="title">
    <h1><yt-formatted-string>Newer YouTube Layout</yt-formatted-string></h1>
  </div>
</ytd-watch-metadata>

<ytd-video-owner-renderer>
  <div id="channel-name">
    <a href="/c/TestChannel">Test Channel</a>
  </div>
</ytd-video-owner-renderer>

<ytd-engagement-panel-section-list-renderer target-id="engagement-panel-searchable-transcript" visibility="ENGAGEMENT_PANEL_VISIBILITY_EXPANDED">
  <div id="content">
    <ytd-transcript-renderer>
      <div id="body">
        <ytd-transcript-segment-list-renderer>
          <div id="segments-container">

            <transcript-segment-view-model>
              <div class="segment-timestamp">0:00</div>
              <span class="yt-core-attributed-string">Welcome to the video.</span>
            </transcript-segment-view-model>

            <transcript-segment-view-model>
              <div class="segment-timestamp">0:04</div>
              <span class="yt-core-attributed-string">Let us get started.</span>
            </transcript-segment-view-model>

            <transcript-segment-view-model>
              <div class="segment-timestamp">0:08</div>
              <span class="yt-core-attributed-string">Here is the main topic.</span>
            </transcript-segment-view-model>

          </div>
        </ytd-transcript-segment-list-renderer>
      </div>
    </ytd-transcript-renderer>
  </div>
</ytd-engagement-panel-section-list-renderer>

</body>
</html>
