<!doctype html>
<html>
<head><title>My Cooking Vlog - YouTube</title></head>
<body>

<ytd-watch-metadata>
  <div id="title">
    <h1><yt-formatted-string>My Cooking Vlog</yt-formatted-string></h1>
  </div>
</ytd-watch-metadata>

<ytd-video-owner-renderer>
  <div id="channel-name">
    <a href="/c/CookingChannel">Cooking Channel</a>
  </div>
</ytd-video-owner-renderer>

<ytd-transcript-renderer>
  <ytd-transcript-segment-list-renderer>

    <ytd-transcript-segment-renderer>
      <div class="segment-timestamp">0:00</div>
      <yt-formatted-string class="segment-text">Welcome to my kitchen.</yt-formatted-string>
    </ytd-transcript-segment-renderer>

    <ytd-transcript-segment-renderer>
      <div class="segment-timestamp">0:03</div>
      <yt-formatted-string class="segment-text">Today I will show you a recipe.</yt-formatted-string>
    </ytd-transcript-segment-renderer>

    <ytd-transcript-segment-renderer>
      <div class="segment-timestamp">0:06</div>
      <yt-formatted-string class="segment-text">First we need some flour.</yt-formatted-string>
    </ytd-transcript-segment-renderer>

  </ytd-transcript-segment-list-renderer>
</ytd-transcript-renderer>

<!-- No chapter markers -->

</body>
</html>
