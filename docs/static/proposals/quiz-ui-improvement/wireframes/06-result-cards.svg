<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 750" width="375" height="750">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .section-title { font-size: 16px; font-weight: 600; }
      .word { font-size: 16px; font-weight: 600; fill: #111; }
      .meaning { font-size: 13px; fill: #555; }
      .review-date { font-size: 12px; fill: #666; }
      .change-link { font-size: 11px; fill: #2563eb; }
      .btn-outline-text-blue { font-size: 11px; font-weight: 500; fill: #2563eb; }
      .btn-outline-text-red { font-size: 11px; font-weight: 500; fill: #dc2626; }
      .btn-outline-text-gray { font-size: 11px; font-weight: 500; fill: #333; }
      .skipped-text { font-size: 12px; fill: #9ca3af; font-style: italic; }
      .annotation { font-size: 10px; fill: #2563eb; font-style: italic; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="375" height="750" fill="#f8f9fa"/>

  <!-- Section: Incorrect -->
  <text x="24" y="30" class="section-title" fill="#dc2626">Incorrect</text>

  <!-- Incorrect result card -->
  <rect x="16" y="44" width="343" height="164" rx="8" fill="#fff" stroke="#fecaca" stroke-width="1"/>
  <rect x="16" y="44" width="343" height="4" rx="2" fill="#dc2626"/>

  <text x="32" y="72" class="word">break the ice</text>
  <text x="32" y="92" class="meaning">to initiate conversation in a social setting</text>

  <text x="32" y="120" class="review-date">Next review: March 16, 2026</text>
  <text x="240" y="120" class="change-link">Change</text>

  <!-- Mark as Correct button -->
  <rect x="32" y="134" width="150" height="28" rx="6" fill="#fff" stroke="#2563eb" stroke-width="1"/>
  <text x="107" y="153" text-anchor="middle" class="btn-outline-text-blue">Mark as Correct</text>

  <!-- Skip button (same style) -->
  <rect x="192" y="134" width="70" height="28" rx="6" fill="#fff" stroke="#d1d5db" stroke-width="1"/>
  <text x="227" y="153" text-anchor="middle" class="btn-outline-text-gray">Skip</text>

  <!-- Section: Correct -->
  <text x="24" y="242" class="section-title" fill="#16a34a">Correct</text>

  <!-- Correct result card -->
  <rect x="16" y="256" width="343" height="164" rx="8" fill="#fff" stroke="#bbf7d0" stroke-width="1"/>
  <rect x="16" y="256" width="343" height="4" rx="2" fill="#16a34a"/>

  <text x="32" y="284" class="word">lose one's temper</text>
  <text x="32" y="304" class="meaning">to become angry</text>

  <text x="32" y="332" class="review-date">Next review: April 2, 2026</text>
  <text x="230" y="332" class="change-link">Change</text>

  <!-- Mark as Incorrect button -->
  <rect x="32" y="346" width="158" height="28" rx="6" fill="#fff" stroke="#dc2626" stroke-width="1"/>
  <text x="111" y="365" text-anchor="middle" class="btn-outline-text-red">Mark as Incorrect</text>

  <!-- Skip button (same style) -->
  <rect x="200" y="346" width="70" height="28" rx="6" fill="#fff" stroke="#d1d5db" stroke-width="1"/>
  <text x="235" y="365" text-anchor="middle" class="btn-outline-text-gray">Skip</text>

  <!-- Annotation -->
  <text x="24" y="458" class="annotation">After overriding, an "Undo" link appears next to the override label.</text>
  <text x="24" y="474" class="annotation">Card moves between Correct/Incorrect sections. Counts update.</text>

  <!-- Annotation for skipped -->
  <text x="24" y="510" class="annotation">After clicking "Skip" on a card:</text>

  <!-- Skipped result card -->
  <rect x="16" y="524" width="343" height="110" rx="8" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>

  <text x="32" y="552" class="word">break the ice</text>
  <!-- Skipped badge -->
  <rect x="270" y="538" width="68" height="20" rx="4" fill="#f3f4f6"/>
  <text x="304" y="552" text-anchor="middle" class="skipped-text">Skipped</text>
  <text x="32" y="572" class="meaning">to initiate conversation in a social setting</text>

  <!-- Resume button (same outline style) -->
  <rect x="32" y="590" width="80" height="28" rx="6" fill="#fff" stroke="#2563eb" stroke-width="1"/>
  <text x="72" y="609" text-anchor="middle" class="btn-outline-text-blue">Resume</text>
</svg>
