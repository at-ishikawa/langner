<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 812" width="375" height="812">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .title { font-size: 20px; font-weight: 600; fill: #111; }
      .subtitle { font-size: 14px; fill: #666; }
      .label { font-size: 13px; fill: #333; font-weight: 500; }
      .body { font-size: 14px; fill: #333; }
      .muted { font-size: 12px; fill: #999; }
      .btn-text { font-size: 15px; font-weight: 600; fill: #fff; }
      .progress { font-size: 13px; fill: #666; }
      .correct { font-size: 16px; font-weight: 600; fill: #16a34a; }
      .link { font-size: 13px; fill: #2563eb; font-weight: 500; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="375" height="812" fill="#f8f9fa"/>

  <!-- Status bar -->
  <rect width="375" height="44" fill="#fff"/>

  <!-- Header -->
  <rect y="44" width="375" height="56" fill="#fff"/>
  <line x1="0" y1="100" x2="375" y2="100" stroke="#e5e7eb"/>
  <text x="187" y="78" text-anchor="middle" class="title">Breakdown</text>

  <!-- Progress -->
  <text x="187" y="124" text-anchor="middle" class="progress">3 / 18</text>
  <rect x="24" y="132" width="327" height="4" rx="2" fill="#e5e7eb"/>
  <rect x="24" y="132" width="54" height="4" rx="2" fill="#2563eb"/>

  <!-- Correct banner -->
  <rect x="0" y="148" width="375" height="44" fill="#dcfce7"/>
  <text x="187" y="175" text-anchor="middle" class="correct">&#10003; Correct</text>

  <!-- Word -->
  <rect x="16" y="208" width="343" height="56" rx="10" fill="#fff" stroke="#e5e7eb"/>
  <text x="32" y="234" font-size="22" font-weight="700" fill="#111">telescope</text>
  <text x="32" y="252" class="muted">an instrument for viewing distant objects</text>

  <!-- Your answer breakdown -->
  <text x="24" y="292" class="label">Your answer</text>
  <rect x="16" y="300" width="343" height="70" rx="10" fill="#fff" stroke="#16a34a" stroke-width="1.5"/>
  <text x="32" y="326" font-size="14" fill="#333">tele = far</text>
  <text x="32" y="350" font-size="14" fill="#333">scope = to look at</text>
  <text x="280" y="326" font-size="12" fill="#16a34a" font-weight="500">&#10003;</text>
  <text x="280" y="350" font-size="12" fill="#16a34a" font-weight="500">&#10003;</text>

  <!-- Full breakdown -->
  <text x="24" y="400" class="label">Full breakdown</text>
  <rect x="16" y="408" width="343" height="76" rx="10" fill="#fff" stroke="#e5e7eb"/>
  <text x="32" y="432" class="link">tele</text>
  <text x="64" y="432" class="body">= far</text>
  <rect x="106" y="420" width="46" height="18" rx="9" fill="#f3f4f6"/>
  <text x="129" y="433" text-anchor="middle" font-size="10" fill="#666">Greek</text>
  <rect x="160" y="420" width="52" height="18" rx="9" fill="#fef3c7"/>
  <text x="186" y="433" text-anchor="middle" font-size="10" fill="#92400e">prefix</text>

  <text x="32" y="464" class="link">scope</text>
  <text x="76" y="464" class="body">= to look at</text>
  <rect x="158" y="452" width="46" height="18" rx="9" fill="#f3f4f6"/>
  <text x="181" y="465" text-anchor="middle" font-size="10" fill="#666">Greek</text>
  <rect x="212" y="452" width="44" height="18" rx="9" fill="#dbeafe"/>
  <text x="234" y="465" text-anchor="middle" font-size="10" fill="#2563eb">root</text>

  <!-- Related words -->
  <text x="24" y="516" class="label">Related words sharing these origins</text>
  <rect x="16" y="524" width="343" height="100" rx="10" fill="#fff" stroke="#e5e7eb"/>

  <text x="32" y="548" class="muted">Also using tele:</text>
  <text x="32" y="568" class="link">telephone, television, telepathy</text>

  <text x="32" y="592" class="muted">Also using scope:</text>
  <text x="32" y="612" class="link">microscope, stethoscope, horoscope</text>

  <!-- Next review date -->
  <text x="24" y="656" class="muted">Next review: April 2, 2026</text>

  <!-- Next button -->
  <rect y="742" width="375" height="70" fill="#fff"/>
  <line x1="0" y1="742" x2="375" y2="742" stroke="#e5e7eb"/>
  <rect x="24" y="754" width="327" height="46" rx="10" fill="#2563eb"/>
  <text x="187" y="783" text-anchor="middle" class="btn-text">Next</text>
</svg>
