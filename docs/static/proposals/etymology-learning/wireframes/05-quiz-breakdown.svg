<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 750" width="375" height="750">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .title { font-size: 20px; font-weight: 600; fill: #111; }
      .subtitle { font-size: 14px; fill: #666; }
      .label { font-size: 13px; fill: #333; font-weight: 500; }
      .body { font-size: 14px; fill: #333; }
      .muted { font-size: 12px; fill: #999; }
      .word-big { font-size: 28px; font-weight: 700; fill: #111; }
      .meaning-text { font-size: 15px; fill: #555; }
      .btn-text { font-size: 15px; font-weight: 600; fill: #fff; }
      .input-text { font-size: 14px; fill: #333; }
      .input-placeholder { font-size: 14px; fill: #aaa; }
      .progress { font-size: 13px; fill: #666; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="375" height="750" fill="#f8f9fa"/>

  <!-- Status bar -->
  <rect width="375" height="44" fill="#fff"/>

  <!-- Header -->
  <rect y="44" width="375" height="56" fill="#fff"/>
  <line x1="0" y1="100" x2="375" y2="100" stroke="#e5e7eb"/>
  <text x="187" y="78" text-anchor="middle" class="title">Breakdown</text>

  <!-- Progress -->
  <text x="187" y="124" text-anchor="middle" class="progress">3 / 18</text>
  <rect x="24" y="132" width="327" height="4" rx="2" fill="#e5e7eb"/>
  <rect x="24" y="132" width="54" height="4" rx="2" fill="#2563eb"/>

  <!-- Word card -->
  <rect x="16" y="152" width="343" height="100" rx="12" fill="#fff" stroke="#e5e7eb"/>
  <text x="187" y="198" text-anchor="middle" class="word-big">telescope</text>
  <text x="187" y="228" text-anchor="middle" class="meaning-text">an instrument for viewing distant objects</text>

  <!-- Instructions -->
  <text x="24" y="284" class="label">What are the origins of this word?</text>
  <text x="24" y="302" class="muted">Type each origin and its meaning. Add more rows as needed.</text>

  <!-- Input row 1 -->
  <text x="24" y="334" class="muted">Origin 1</text>
  <rect x="24" y="340" width="150" height="40" rx="8" fill="#fff" stroke="#d1d5db"/>
  <text x="36" y="365" class="input-text">tele</text>
  <text x="182" y="356" class="muted">=</text>
  <rect x="194" y="340" width="157" height="40" rx="8" fill="#fff" stroke="#d1d5db"/>
  <text x="206" y="365" class="input-text">far</text>

  <!-- Input row 2 -->
  <text x="24" y="400" class="muted">Origin 2</text>
  <rect x="24" y="406" width="150" height="40" rx="8" fill="#fff" stroke="#d1d5db"/>
  <text x="36" y="431" class="input-text">scope</text>
  <text x="182" y="422" class="muted">=</text>
  <rect x="194" y="406" width="157" height="40" rx="8" fill="#fff" stroke="#d1d5db"/>
  <text x="206" y="431" class="input-placeholder">meaning...</text>

  <!-- Add row button -->
  <text x="24" y="476" font-size="13" fill="#2563eb" font-weight="500">+ Add origin</text>

  <!-- Submit button (fixed at bottom) -->
  <rect y="680" width="375" height="70" fill="#fff"/>
  <line x1="0" y1="680" x2="375" y2="680" stroke="#e5e7eb"/>
  <rect x="24" y="692" width="327" height="46" rx="10" fill="#2563eb"/>
  <text x="187" y="721" text-anchor="middle" class="btn-text">Submit</text>
</svg>
