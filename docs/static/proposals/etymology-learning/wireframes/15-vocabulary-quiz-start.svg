<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 700" width="375" height="700">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .title { font-size: 20px; font-weight: 600; fill: #111; }
      .label { font-size: 13px; fill: #333; font-weight: 500; }
      .body { font-size: 14px; fill: #333; }
      .muted { font-size: 12px; fill: #999; }
      .subtitle { font-size: 14px; fill: #666; }
      .btn-text { font-size: 15px; font-weight: 600; fill: #fff; }
      .count { font-size: 13px; fill: #666; }
      .back { font-size: 12px; fill: #2563eb; }
      .mode-label { font-size: 14px; fill: #333; font-weight: 500; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="375" height="700" fill="#f8f9fa"/>

  <!-- Status bar -->
  <rect width="375" height="44" fill="#fff"/>

  <!-- Header -->
  <rect y="44" width="375" height="56" fill="#fff"/>
  <line x1="0" y1="100" x2="375" y2="100" stroke="#e5e7eb"/>
  <text x="24" y="68" class="back">&lt; Quiz</text>
  <text x="187" y="84" text-anchor="middle" class="title">Standard Quiz</text>

  <!-- Notebook Selection Section -->
  <text x="24" y="136" class="label">Select notebooks</text>

  <!-- Select All -->
  <rect x="24" y="148" width="327" height="44" rx="8" fill="#fff" stroke="#d1d5db"/>
  <rect x="40" y="162" width="18" height="18" rx="4" fill="#fff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="68" y="176" class="body" font-weight="600">All notebooks</text>

  <!-- Notebook with checkbox (selected) -->
  <rect x="24" y="200" width="327" height="44" rx="8" fill="#fff" stroke="#d1d5db"/>
  <rect x="40" y="214" width="18" height="18" rx="4" fill="#2563eb"/>
  <path d="M44 223 L48 227 L54 219" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="68" y="228" class="body">Frankenstein</text>
  <text x="310" y="228" text-anchor="end" class="count">12</text>

  <!-- Notebook (unselected) -->
  <rect x="24" y="252" width="327" height="44" rx="8" fill="#fff" stroke="#d1d5db"/>
  <rect x="40" y="266" width="18" height="18" rx="4" fill="#fff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="68" y="280" class="body">English Vocabulary</text>
  <text x="310" y="280" text-anchor="end" class="count">45</text>

  <!-- Notebook (selected) -->
  <rect x="24" y="304" width="327" height="44" rx="8" fill="#fff" stroke="#d1d5db"/>
  <rect x="40" y="318" width="18" height="18" rx="4" fill="#2563eb"/>
  <path d="M44 327 L48 331 L54 323" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="68" y="332" class="body">English Idioms</text>
  <text x="310" y="332" text-anchor="end" class="count">8</text>

  <!-- Toggle: Include unstudied -->
  <rect x="24" y="376" width="327" height="48" rx="8" fill="#fff" stroke="#d1d5db"/>
  <text x="40" y="405" class="label">Include unstudied words</text>
  <rect x="301" y="392" width="36" height="20" rx="10" fill="#d1d5db"/>
  <circle cx="313" cy="402" r="8" fill="#fff"/>

  <!-- Words due -->
  <text x="187" y="466" text-anchor="middle" font-size="15" font-weight="600" fill="#111">20 words due for review</text>

  <!-- Start button -->
  <rect x="24" y="490" width="327" height="52" rx="10" fill="#2563eb"/>
  <text x="187" y="522" text-anchor="middle" class="btn-text">Start</text>
</svg>
