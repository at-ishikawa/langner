<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 812" width="375" height="812">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .title { font-size: 20px; font-weight: 600; fill: #111; }
      .subtitle { font-size: 14px; fill: #666; }
      .label { font-size: 13px; fill: #333; font-weight: 500; }
      .body { font-size: 14px; fill: #333; }
      .muted { font-size: 12px; fill: #999; }
      .word-name { font-size: 16px; font-weight: 600; fill: #111; }
      .link { font-size: 13px; fill: #2563eb; font-weight: 500; }
      .part-sep { font-size: 13px; fill: #999; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="375" height="812" fill="#f8f9fa"/>

  <!-- Status bar -->
  <rect width="375" height="44" fill="#fff"/>

  <!-- Header -->
  <rect y="44" width="375" height="56" fill="#fff"/>
  <line x1="0" y1="100" x2="375" y2="100" stroke="#e5e7eb"/>
  <text x="24" y="68" class="muted">&lt; Back to notebooks</text>
  <text x="187" y="82" text-anchor="middle" class="title">vocabulary</text>
  <text x="187" y="97" text-anchor="middle" class="muted">28 words</text>

  <!-- Definition card 1: telephone (has origin_parts) -->
  <rect x="16" y="116" width="343" height="130" rx="10" fill="#fff" stroke="#e5e7eb"/>
  <text x="32" y="146" class="word-name">telephone</text>
  <text x="32" y="168" class="body">a device for transmitting sound over a distance</text>

  <!-- Origin parts label -->
  <text x="32" y="192" class="muted">Origins:</text>

  <!-- Origin pill: tele -->
  <rect x="32" y="200" width="92" height="26" rx="13" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="48" y="217" class="link">tele</text>
  <rect x="76" y="204" width="42" height="18" rx="9" fill="#f3f4f6"/>
  <text x="97" y="216" text-anchor="middle" font-size="10" fill="#666">Greek</text>

  <!-- Plus separator -->
  <text x="132" y="218" class="part-sep">+</text>

  <!-- Origin pill: phone -->
  <rect x="144" y="200" width="104" height="26" rx="13" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="160" y="217" class="link">phone</text>
  <rect x="196" y="204" width="42" height="18" rx="9" fill="#f3f4f6"/>
  <text x="217" y="216" text-anchor="middle" font-size="10" fill="#666">Greek</text>

  <!-- Definition card 2: microscope (has origin_parts) -->
  <rect x="16" y="262" width="343" height="130" rx="10" fill="#fff" stroke="#e5e7eb"/>
  <text x="32" y="292" class="word-name">microscope</text>
  <text x="32" y="314" class="body">an instrument for viewing very small objects</text>

  <!-- Origin parts label -->
  <text x="32" y="338" class="muted">Origins:</text>

  <!-- Origin pill: micro -->
  <rect x="32" y="346" width="100" height="26" rx="13" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="48" y="363" class="link">micro</text>
  <rect x="84" y="350" width="42" height="18" rx="9" fill="#f3f4f6"/>
  <text x="105" y="362" text-anchor="middle" font-size="10" fill="#666">Greek</text>

  <!-- Plus separator -->
  <text x="140" y="364" class="part-sep">+</text>

  <!-- Origin pill: scope -->
  <rect x="152" y="346" width="102" height="26" rx="13" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="168" y="363" class="link">scope</text>
  <rect x="204" y="350" width="42" height="18" rx="9" fill="#f3f4f6"/>
  <text x="225" y="362" text-anchor="middle" font-size="10" fill="#666">Greek</text>

  <!-- Definition card 3: break the ice (NO origin_parts) -->
  <rect x="16" y="408" width="343" height="80" rx="10" fill="#fff" stroke="#e5e7eb"/>
  <text x="32" y="438" class="word-name">break the ice</text>
  <text x="32" y="460" class="body">to initiate social interaction in an awkward situation</text>
  <!-- No origin parts section — demonstrates optional behavior -->

  <!-- Hint text -->
  <text x="187" y="530" text-anchor="middle" class="muted">Tap a blue origin to view its detail page</text>
  <text x="187" y="548" text-anchor="middle" class="muted">Origin parts are only shown when available</text>
</svg>
