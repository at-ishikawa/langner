<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 700" width="375" height="700">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .title { font-size: 20px; font-weight: 600; fill: #111; }
      .subtitle { font-size: 14px; fill: #666; }
      .label { font-size: 13px; fill: #333; font-weight: 500; }
      .body { font-size: 14px; fill: #333; }
      .muted { font-size: 12px; fill: #999; }
      .meaning-title { font-size: 15px; font-weight: 600; fill: #111; }
      .link { font-size: 14px; fill: #2563eb; font-weight: 500; }
      .tab-active { font-size: 13px; font-weight: 600; fill: #2563eb; }
      .tab-inactive { font-size: 13px; fill: #999; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="375" height="700" fill="#f8f9fa"/>

  <!-- Status bar -->
  <rect width="375" height="44" fill="#fff"/>

  <!-- Header -->
  <rect y="44" width="375" height="56" fill="#fff"/>
  <line x1="0" y1="100" x2="375" y2="100" stroke="#e5e7eb"/>
  <text x="24" y="68" class="muted">&lt; Notebooks</text>
  <text x="187" y="82" text-anchor="middle" class="title">Etymology</text>

  <!-- Search bar -->
  <rect x="24" y="112" width="327" height="40" rx="8" fill="#fff" stroke="#d1d5db"/>
  <text x="48" y="137" class="muted">Search origins or meanings...</text>

  <!-- Filter tabs - By Meaning active -->
  <rect y="164" width="375" height="40" fill="#fff"/>
  <line x1="0" y1="204" x2="375" y2="204" stroke="#e5e7eb"/>
  <text x="100" y="190" text-anchor="middle" class="tab-inactive">All Origins</text>
  <text x="275" y="190" text-anchor="middle" class="tab-active">By Meaning</text>
  <rect x="227" y="196" width="96" height="3" rx="1.5" fill="#2563eb"/>

  <!-- Meaning group 1: "to write" -->
  <rect x="16" y="220" width="343" height="88" rx="10" fill="#fff" stroke="#e5e7eb"/>
  <text x="32" y="248" class="meaning-title">"to write"</text>
  <text x="32" y="272" class="link">graphein</text>
  <rect x="100" y="260" width="46" height="18" rx="9" fill="#f3f4f6"/>
  <text x="123" y="273" text-anchor="middle" font-size="10" fill="#666">Greek</text>
  <text x="160" y="272" class="muted">4 words</text>
  <text x="32" y="294" class="link">scribere</text>
  <rect x="100" y="282" width="46" height="18" rx="9" fill="#f3f4f6"/>
  <text x="123" y="295" text-anchor="middle" font-size="10" fill="#666">Latin</text>
  <text x="160" y="294" class="muted">3 words</text>

  <!-- Meaning group 2: "small" -->
  <rect x="16" y="324" width="343" height="66" rx="10" fill="#fff" stroke="#e5e7eb"/>
  <text x="32" y="352" class="meaning-title">"small"</text>
  <text x="32" y="376" class="link">micro</text>
  <rect x="78" y="364" width="46" height="18" rx="9" fill="#f3f4f6"/>
  <text x="101" y="377" text-anchor="middle" font-size="10" fill="#666">Greek</text>
  <text x="138" y="376" class="muted">3 words</text>

  <!-- Meaning group 3: "far" -->
  <rect x="16" y="406" width="343" height="66" rx="10" fill="#fff" stroke="#e5e7eb"/>
  <text x="32" y="434" class="meaning-title">"far"</text>
  <text x="32" y="458" class="link">tele</text>
  <rect x="64" y="446" width="46" height="18" rx="9" fill="#f3f4f6"/>
  <text x="87" y="459" text-anchor="middle" font-size="10" fill="#666">Greek</text>
  <text x="124" y="458" class="muted">3 words</text>

  <!-- Meaning group 4: "sound, voice" -->
  <rect x="16" y="488" width="343" height="66" rx="10" fill="#fff" stroke="#e5e7eb"/>
  <text x="32" y="516" class="meaning-title">"sound, voice"</text>
  <text x="32" y="540" class="link">phone</text>
  <rect x="82" y="528" width="46" height="18" rx="9" fill="#f3f4f6"/>
  <text x="105" y="541" text-anchor="middle" font-size="10" fill="#666">Greek</text>
  <text x="142" y="540" class="muted">5 words</text>

  <!-- Meaning group 5: "circle, wheel" -->
  <rect x="16" y="570" width="343" height="66" rx="10" fill="#fff" stroke="#e5e7eb"/>
  <text x="32" y="598" class="meaning-title">"circle, wheel"</text>
  <text x="32" y="622" class="link">kyklos</text>
  <rect x="84" y="610" width="46" height="18" rx="9" fill="#f3f4f6"/>
  <text x="107" y="623" text-anchor="middle" font-size="10" fill="#666">Greek</text>
  <text x="144" y="622" class="muted">4 words</text>

  <!-- Hint -->
  <text x="187" y="668" text-anchor="middle" class="muted">Tap an origin to see its word family</text>
</svg>
