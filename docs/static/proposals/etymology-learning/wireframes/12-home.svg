<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 620" width="375" height="620">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .title { font-size: 24px; font-weight: 600; fill: #111; }
      .subtitle { font-size: 14px; fill: #666; }
      .card-title { font-size: 18px; font-weight: 600; fill: #111; }
      .card-desc { font-size: 13px; fill: #666; }
      .card-icon { font-size: 28px; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="375" height="620" fill="#f8f9fa"/>

  <!-- Status bar -->
  <rect width="375" height="44" fill="#fff"/>

  <!-- Header area -->
  <rect y="44" width="375" height="100" fill="#fff"/>
  <text x="187" y="96" text-anchor="middle" class="title">Langner</text>
  <text x="187" y="120" text-anchor="middle" class="subtitle">What would you like to do?</text>
  <line x1="0" y1="144" x2="375" y2="144" stroke="#e5e7eb"/>

  <!-- Card 1: Books -->
  <rect x="24" y="168" width="327" height="110" rx="12" fill="#fff" stroke="#e5e7eb"/>
  <rect x="24" y="168" width="327" height="110" rx="12" fill="#fff" stroke="#e5e7eb"/>
  <!-- Icon placeholder -->
  <rect x="44" y="196" width="48" height="48" rx="10" fill="#eff6ff"/>
  <text x="68" y="228" text-anchor="middle" font-size="24" fill="#2563eb">B</text>
  <!-- Text -->
  <text x="112" y="214" class="card-title">Books</text>
  <text x="112" y="236" class="card-desc">Read books and look up words</text>
  <!-- Arrow indicator -->
  <text x="330" y="224" text-anchor="end" font-size="16" fill="#999">&#x203A;</text>

  <!-- Card 2: Learn -->
  <rect x="24" y="298" width="327" height="110" rx="12" fill="#fff" stroke="#e5e7eb"/>
  <!-- Icon placeholder -->
  <rect x="44" y="326" width="48" height="48" rx="10" fill="#eff6ff"/>
  <text x="68" y="358" text-anchor="middle" font-size="24" fill="#2563eb">L</text>
  <!-- Text -->
  <text x="112" y="344" class="card-title">Learn</text>
  <text x="112" y="366" class="card-desc">Browse vocabulary notebooks</text>
  <text x="112" y="384" class="card-desc">and etymology origins</text>
  <!-- Arrow indicator -->
  <text x="330" y="354" text-anchor="end" font-size="16" fill="#999">&#x203A;</text>

  <!-- Card 3: Quiz -->
  <rect x="24" y="428" width="327" height="110" rx="12" fill="#fff" stroke="#e5e7eb"/>
  <!-- Icon placeholder -->
  <rect x="44" y="456" width="48" height="48" rx="10" fill="#eff6ff"/>
  <text x="68" y="488" text-anchor="middle" font-size="24" fill="#2563eb">Q</text>
  <!-- Text -->
  <text x="112" y="474" class="card-title">Quiz</text>
  <text x="112" y="496" class="card-desc">Practice vocabulary and</text>
  <text x="112" y="514" class="card-desc">etymology with spaced repetition</text>
  <!-- Arrow indicator -->
  <text x="330" y="484" text-anchor="end" font-size="16" fill="#999">&#x203A;</text>
</svg>
