<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 750" width="375" height="750">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .title { font-size: 20px; font-weight: 600; fill: #111; }
      .subtitle { font-size: 14px; fill: #666; }
      .label { font-size: 13px; fill: #333; font-weight: 500; }
      .body { font-size: 14px; fill: #333; }
      .muted { font-size: 12px; fill: #999; }
      .btn-text { font-size: 15px; font-weight: 600; fill: #fff; }
      .btn-outline { font-size: 14px; font-weight: 500; fill: #2563eb; }
      .word-big { font-size: 28px; font-weight: 700; fill: #111; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="375" height="750" fill="#f8f9fa"/>

  <!-- Status bar -->
  <rect width="375" height="44" fill="#fff"/>

  <!-- Header -->
  <rect y="44" width="375" height="56" fill="#fff"/>
  <line x1="0" y1="100" x2="375" y2="100" stroke="#e5e7eb"/>
  <text x="187" y="78" text-anchor="middle" class="title">Freeform Etymology</text>

  <!-- No progress bar (open-ended) -->

  <!-- Instructions -->
  <text x="24" y="136" class="label">Type any word to see its etymology</text>
  <text x="24" y="154" class="muted">The word must exist in your etymology notebooks.</text>

  <!-- Word input -->
  <rect x="24" y="170" width="327" height="48" rx="8" fill="#fff" stroke="#d1d5db"/>
  <text x="40" y="200" font-size="16" fill="#333">telephone</text>

  <!-- Word status indicator (found, due for review) -->
  <text x="24" y="238" font-size="12" fill="#16a34a">&#x2713; Found in: Greek &amp; Latin Roots</text>

  <!-- Origins input area -->
  <text x="24" y="272" class="label">What are the origins of this word?</text>

  <!-- Input row 1 -->
  <text x="24" y="300" class="muted">Origin 1</text>
  <rect x="24" y="306" width="150" height="40" rx="8" fill="#fff" stroke="#d1d5db"/>
  <text x="36" y="331" class="body">tele</text>
  <text x="182" y="322" class="muted">=</text>
  <rect x="194" y="306" width="157" height="40" rx="8" fill="#fff" stroke="#d1d5db"/>
  <text x="206" y="331" class="body">far</text>

  <!-- Input row 2 -->
  <text x="24" y="366" class="muted">Origin 2</text>
  <rect x="24" y="372" width="150" height="40" rx="8" fill="#fff" stroke="#d1d5db"/>
  <text x="36" y="397" font-size="14" fill="#aaa">origin...</text>
  <text x="182" y="388" class="muted">=</text>
  <rect x="194" y="372" width="157" height="40" rx="8" fill="#fff" stroke="#d1d5db"/>
  <text x="206" y="397" font-size="14" fill="#aaa">meaning...</text>

  <!-- Add row button -->
  <text x="24" y="440" font-size="13" fill="#2563eb" font-weight="500">+ Add origin</text>

  <!-- Submit button -->
  <rect y="680" width="375" height="70" fill="#fff"/>
  <line x1="0" y1="680" x2="375" y2="680" stroke="#e5e7eb"/>
  <rect x="24" y="692" width="327" height="46" rx="10" fill="#2563eb"/>
  <text x="187" y="721" text-anchor="middle" class="btn-text">Submit</text>
</svg>
