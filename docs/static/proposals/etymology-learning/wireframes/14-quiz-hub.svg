<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 812" width="375" height="812">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .title { font-size: 20px; font-weight: 600; fill: #111; }
      .card-title { font-size: 16px; font-weight: 600; fill: #111; }
      .card-desc { font-size: 13px; fill: #666; }
      .back { font-size: 12px; fill: #2563eb; }
      .tab-active { font-size: 14px; font-weight: 600; fill: #2563eb; }
      .tab-inactive { font-size: 14px; fill: #999; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="375" height="812" fill="#f8f9fa"/>

  <!-- Status bar -->
  <rect width="375" height="44" fill="#fff"/>

  <!-- Header -->
  <rect y="44" width="375" height="56" fill="#fff"/>
  <line x1="0" y1="100" x2="375" y2="100" stroke="#e5e7eb"/>
  <text x="24" y="68" class="back">&lt; Home</text>
  <text x="187" y="84" text-anchor="middle" class="title">Quiz</text>

  <!-- Tabs -->
  <rect y="100" width="375" height="44" fill="#fff"/>
  <line x1="0" y1="144" x2="375" y2="144" stroke="#e5e7eb"/>
  <text x="100" y="128" text-anchor="middle" class="tab-active">Vocabulary</text>
  <rect x="52" y="138" width="96" height="3" rx="1.5" fill="#2563eb"/>
  <text x="275" y="128" text-anchor="middle" class="tab-inactive">Etymology</text>

  <!-- Vocabulary tab content -->

  <!-- Standard card -->
  <rect x="24" y="168" width="327" height="72" rx="12" fill="#fff" stroke="#e5e7eb"/>
  <text x="40" y="200" class="card-title">Standard</text>
  <text x="40" y="220" class="card-desc">See a word, type its meaning</text>
  <text x="335" y="206" font-size="14" fill="#999">&#x203A;</text>

  <!-- Reverse card -->
  <rect x="24" y="252" width="327" height="72" rx="12" fill="#fff" stroke="#e5e7eb"/>
  <text x="40" y="284" class="card-title">Reverse</text>
  <text x="40" y="304" class="card-desc">See a meaning, type the word</text>
  <text x="335" y="290" font-size="14" fill="#999">&#x203A;</text>

  <!-- Freeform card -->
  <rect x="24" y="336" width="327" height="72" rx="12" fill="#fff" stroke="#e5e7eb"/>
  <text x="40" y="368" class="card-title">Freeform</text>
  <text x="40" y="388" class="card-desc">Type any word and its meaning</text>
  <text x="335" y="374" font-size="14" fill="#999">&#x203A;</text>
</svg>
