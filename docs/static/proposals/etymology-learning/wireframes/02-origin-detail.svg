<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 812" width="375" height="812">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .title { font-size: 20px; font-weight: 600; fill: #111; }
      .subtitle { font-size: 14px; fill: #666; }
      .label { font-size: 13px; fill: #333; font-weight: 500; }
      .body { font-size: 14px; fill: #333; }
      .muted { font-size: 12px; fill: #999; }
      .origin-name { font-size: 24px; font-weight: 700; fill: #111; }
      .word-name { font-size: 16px; font-weight: 600; fill: #111; }
      .link { font-size: 14px; fill: #2563eb; font-weight: 500; }
      .part-sep { font-size: 14px; fill: #999; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="375" height="812" fill="#f8f9fa"/>

  <!-- Status bar -->
  <rect width="375" height="44" fill="#fff"/>

  <!-- Header -->
  <rect y="44" width="375" height="56" fill="#fff"/>
  <line x1="0" y1="100" x2="375" y2="100" stroke="#e5e7eb"/>
  <text x="24" y="68" class="muted">&lt; Origin List</text>
  <text x="187" y="82" text-anchor="middle" class="title">Origin Detail</text>

  <!-- Origin info card -->
  <rect x="16" y="116" width="343" height="100" rx="10" fill="#fff" stroke="#e5e7eb"/>
  <text x="32" y="150" class="origin-name">phone</text>
  <rect x="32" y="160" width="44" height="18" rx="9" fill="#dbeafe"/>
  <text x="54" y="173" text-anchor="middle" font-size="10" fill="#2563eb" font-weight="500">root</text>
  <rect x="82" y="160" width="46" height="18" rx="9" fill="#f3f4f6"/>
  <text x="105" y="173" text-anchor="middle" font-size="10" fill="#666">Greek</text>
  <text x="32" y="200" class="subtitle">sound, voice</text>

  <!-- Section: Words using this origin -->
  <text x="24" y="244" class="label">Words using this origin (5)</text>

  <!-- Word card 1: telephone -->
  <rect x="16" y="258" width="343" height="90" rx="10" fill="#fff" stroke="#e5e7eb"/>
  <text x="32" y="284" class="word-name">telephone</text>
  <text x="32" y="304" class="body">a device for transmitting sound over a distance</text>
  <!-- Origin breakdown - clickable links -->
  <text x="32" y="330" class="link">tele</text>
  <text x="62" y="330" class="part-sep">+</text>
  <rect x="71" y="318" width="52" height="18" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="97" y="331" text-anchor="middle" font-size="13" fill="#2563eb" font-weight="600">phone</text>
  <text x="140" y="330" class="muted">(current)</text>

  <!-- Word card 2: microphone -->
  <rect x="16" y="362" width="343" height="90" rx="10" fill="#fff" stroke="#e5e7eb"/>
  <text x="32" y="388" class="word-name">microphone</text>
  <text x="32" y="408" class="body">a device that converts sound into electrical signals</text>
  <text x="32" y="434" class="link">micro</text>
  <text x="75" y="434" class="part-sep">+</text>
  <rect x="84" y="422" width="52" height="18" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="110" y="435" text-anchor="middle" font-size="13" fill="#2563eb" font-weight="600">phone</text>
  <text x="153" y="434" class="muted">(current)</text>

  <!-- Word card 3: phonetic -->
  <rect x="16" y="466" width="343" height="90" rx="10" fill="#fff" stroke="#e5e7eb"/>
  <text x="32" y="492" class="word-name">phonetic</text>
  <text x="32" y="512" class="body">relating to the sounds of speech</text>
  <text x="32" y="538" class="muted">adjective</text>
  <rect x="95" y="526" width="52" height="18" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="121" y="539" text-anchor="middle" font-size="13" fill="#2563eb" font-weight="600">phone</text>
  <text x="164" y="538" class="muted">(current)</text>

  <!-- Word card 4: symphony -->
  <rect x="16" y="570" width="343" height="90" rx="10" fill="#fff" stroke="#e5e7eb"/>
  <text x="32" y="596" class="word-name">symphony</text>
  <text x="32" y="616" class="body">a long musical composition for orchestra</text>
  <text x="32" y="642" class="link">syn</text>
  <text x="55" y="642" class="part-sep">+</text>
  <rect x="64" y="630" width="52" height="18" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
  <text x="90" y="643" text-anchor="middle" font-size="13" fill="#2563eb" font-weight="600">phone</text>
  <text x="133" y="642" class="muted">(current)</text>

  <!-- Hint text -->
  <text x="187" y="700" text-anchor="middle" class="muted">Tap a blue origin to navigate to its page</text>
</svg>
