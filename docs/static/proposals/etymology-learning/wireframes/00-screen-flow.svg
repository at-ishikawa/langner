<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" width="900" height="580">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .screen-title { font-size: 13px; font-weight: 600; fill: #111; }
      .screen-desc { font-size: 10px; fill: #666; }
      .arrow-label { font-size: 10px; fill: #2563eb; }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#2563eb"/>
    </marker>
  </defs>

  <rect width="900" height="580" fill="#f8f9fa"/>

  <text x="450" y="30" text-anchor="middle" font-size="16" font-weight="600" fill="#111">Screen Flow</text>

  <!-- Row 1: Browse Flow -->
  <text x="20" y="65" font-size="12" font-weight="600" fill="#666">Browse</text>

  <!-- Notebook List -->
  <rect x="20" y="80" width="140" height="80" rx="8" fill="#fff" stroke="#d1d5db"/>
  <text x="90" y="110" text-anchor="middle" class="screen-title">Notebooks</text>
  <text x="90" y="128" text-anchor="middle" class="screen-desc">Select etymology notebook</text>

  <line x1="160" y1="120" x2="200" y2="120" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Origin List -->
  <rect x="205" y="80" width="140" height="80" rx="8" fill="#fff" stroke="#d1d5db"/>
  <text x="275" y="110" text-anchor="middle" class="screen-title">Origin List</text>
  <text x="275" y="128" text-anchor="middle" class="screen-desc">All Origins / By Meaning</text>

  <line x1="345" y1="120" x2="385" y2="120" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Origin Detail -->
  <rect x="390" y="80" width="140" height="80" rx="8" fill="#fff" stroke="#d1d5db"/>
  <text x="460" y="110" text-anchor="middle" class="screen-title">Origin Detail</text>
  <text x="460" y="128" text-anchor="middle" class="screen-desc">Words using this origin</text>

  <!-- Self-loop for origin navigation -->
  <path d="M530,100 C580,70 580,150 530,130" fill="none" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="575" y="110" class="arrow-label">click origin</text>

  <!-- Arrow to By Meaning -->
  <line x1="275" y1="160" x2="275" y2="195" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="280" y="185" class="arrow-label">tab</text>

  <!-- By Meaning -->
  <rect x="205" y="200" width="140" height="80" rx="8" fill="#fff" stroke="#d1d5db"/>
  <text x="275" y="230" text-anchor="middle" class="screen-title">Browse by Meaning</text>
  <text x="275" y="248" text-anchor="middle" class="screen-desc">Origins grouped by meaning</text>

  <line x1="345" y1="240" x2="450" y2="160" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Row 2: Structured Quiz Flow -->
  <text x="20" y="340" font-size="12" font-weight="600" fill="#666">Structured Quiz (Breakdown / Assembly)</text>

  <rect x="20" y="355" width="140" height="80" rx="8" fill="#fff" stroke="#d1d5db"/>
  <text x="90" y="385" text-anchor="middle" class="screen-title">Quiz Start</text>
  <text x="90" y="403" text-anchor="middle" class="screen-desc">Select notebooks + mode</text>

  <line x1="160" y1="395" x2="200" y2="395" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="205" y="355" width="140" height="80" rx="8" fill="#fff" stroke="#d1d5db"/>
  <text x="275" y="385" text-anchor="middle" class="screen-title">Quiz Card</text>
  <text x="275" y="403" text-anchor="middle" class="screen-desc">Breakdown or Assembly</text>

  <line x1="345" y1="395" x2="385" y2="395" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="390" y="355" width="140" height="80" rx="8" fill="#fff" stroke="#d1d5db"/>
  <text x="460" y="385" text-anchor="middle" class="screen-title">Feedback</text>
  <text x="460" y="403" text-anchor="middle" class="screen-desc">Correct/incorrect + review</text>

  <path d="M460,435 L460,455 L275,455 L275,435" fill="none" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="367" y="470" text-anchor="middle" class="arrow-label">next word</text>

  <line x1="530" y1="395" x2="570" y2="395" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="575" y="355" width="140" height="80" rx="8" fill="#fff" stroke="#d1d5db"/>
  <text x="645" y="385" text-anchor="middle" class="screen-title">Session Complete</text>
  <text x="645" y="403" text-anchor="middle" class="screen-desc">Results summary</text>

  <!-- Row 3: Freeform Quiz Flow -->
  <text x="20" y="510" font-size="12" font-weight="600" fill="#666">Freeform Quiz</text>

  <rect x="20" y="525" width="140" height="55" rx="8" fill="#fff" stroke="#d1d5db"/>
  <text x="90" y="550" text-anchor="middle" class="screen-title">Freeform</text>
  <text x="90" y="566" text-anchor="middle" class="screen-desc">Type any word</text>

  <line x1="160" y1="552" x2="200" y2="552" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="205" y="525" width="140" height="55" rx="8" fill="#fff" stroke="#d1d5db"/>
  <text x="275" y="550" text-anchor="middle" class="screen-title">Feedback</text>
  <text x="275" y="566" text-anchor="middle" class="screen-desc">Breakdown + related words</text>

  <!-- Loop back -->
  <path d="M275,580 L275,595 L90,595 L90,580" fill="none" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="182" y="608" text-anchor="middle" class="arrow-label">next word</text>

  <line x1="345" y1="552" x2="385" y2="552" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="390" y="525" width="140" height="55" rx="8" fill="#fff" stroke="#d1d5db"/>
  <text x="460" y="550" text-anchor="middle" class="screen-title">See Results</text>
  <text x="460" y="566" text-anchor="middle" class="screen-desc">Session summary</text>
</svg>
